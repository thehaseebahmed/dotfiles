services:
    n8n:
      image: ghcr.io/n8n-io/n8n:latest
      container_name: n8n
        
      restart: unless-stopped
      pull_policy: weekly

      ports:
        - 5678:5678

      volumes:
        - ~/volumes/n8n:/home/node/.n8n
        - ~/volumes/booklore/read_later:/home/node/.n8n-files/read_later:rw

      environment:
        PUID: 1000
        GUID: 1000
        GENERIC_TIMEZONE: "Europe/Amsterdam"
        NODE_FUNCTION_ALLOW_EXTERNAL: "@mozilla/readability,linkedom,turndown"
        WEBHOOK_URL: "https://n8n.lykoi-mark.ts.net"
        N8N_EDITOR_BASE_URL: "https://n8n.lykoi-mark.ts.net"
        N8N_HOST: "n8n.lykoi-mark.tsn.net"
        N8N_PROTOCOL: "https"
    n8n-cache:
      image: redis:8.8-alpine
      container_name: n8n-cache

      restart: unless-stopped
      
      ports:
        - 5679:6379

      volumes:
        - redis_data:/data

volumes:
  redis_data:
