services:
  hermes:
    build:
      context: .
    # image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: >
      sh -c "
      /opt/hermes/.venv/bin/python /opt/hermes/hermes gateway run &
      /opt/hermes/.venv/bin/python /opt/hermes/hermes -p armish gateway run &
      /opt/hermes/.venv/bin/python /opt/hermes/hermes -p butler gateway run &
      /opt/hermes/.venv/bin/python /opt/hermes/hermes -p librarian gateway run &
      /opt/hermes/.venv/bin/python /opt/hermes/hermes -p lobster gateway run &
      wait
      "
    pull_policy: daily
    ports:
      - "8642:8642"   # gateway API
      - "9119:9119"   # dashboard (only reached when HERMES_DASHBOARD=1)
    volumes:
      - ~/volumes/hermes:/opt/data
      - ~/volumes/obsidian:/opt/data/obsidian
      - ./.gitconfig:/opt/data/.gitconfig  
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
