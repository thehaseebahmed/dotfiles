services:
  mempalace-mcp:
    image: ghcr.io/thehaseebahmed/mempalace-mcp:latest
    container_name: mempalace-mcp
    user: "1000:1000"
    ports:
      - "3000:3000"
    volumes:
      - ~/volumes/mempalace/data:/data
    environment:
      - BASE_DIR=/data
      - TRANSFORMERS_CACHE=/data/.cache/transformers
      - HF_HOME=/data/.cache/huggingface
    restart: unless-stopped
